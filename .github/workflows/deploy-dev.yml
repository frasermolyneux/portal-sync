name: Deploy Dev

on:
  workflow_dispatch:

permissions: {}

jobs:
  build-and-test:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: frasermolyneux/actions/dotnet-func-ci@dotnet-func-ci/v1.4
        with:
          dotnet-project: "XtremeIdiots.Portal.Sync.App"
          dotnet-version: 9.0.x
          src-folder: "src"

  terraform-plan-and-apply-dev:
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs: build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output
        shell: bash
        run: |
          cd terraform
          echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "api_management_name=$(terraform output -raw api_management_name)" >> $GITHUB_OUTPUT
          echo "api_management_resource_group_name=$(terraform output -raw api_management_resource_group_name)" >> $GITHUB_OUTPUT
          echo "api_management_product_id=$(terraform output -raw api_management_product_id)" >> $GITHUB_OUTPUT
          echo "api_version_set_id=$(terraform output -raw api_version_set_id)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

    outputs:
      function_app_name: ${{ steps.terraform-output.outputs.function_app_name }}
      resource_group_name: ${{ steps.terraform-output.outputs.resource_group_name }}
      api_management_name: ${{ steps.terraform-output.outputs.api_management_name }}
      api_management_resource_group_name: ${{ steps.terraform-output.outputs.api_management_resource_group_name }}
      api_management_product_id: ${{ steps.terraform-output.outputs.api_management_product_id }}
      api_version_set_id: ${{ steps.terraform-output.outputs.api_version_set_id }}

  function-app-deploy-dev:
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs: [build-and-test, terraform-plan-and-apply-dev]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - uses: frasermolyneux/actions/deploy-function-app@deploy-function-app/v1.2
        with:
          function-app-artifact-name: "XtremeIdiots.Portal.Sync.App"
          function-app-name: ${{ needs.terraform-plan-and-apply-dev.outputs.function_app_name }}
          function-app-resource-group: ${{ needs.terraform-plan-and-apply-dev.outputs.resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  apim-api-import-dev:
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs: [terraform-plan-and-apply-dev, function-app-deploy-dev]
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Import Sync API to APIM
        uses: azure/cli@v3
        with:
          inlineScript: |
            az apim api import \
              --resource-group "${{ needs.terraform-plan-and-apply-dev.outputs.api_management_resource_group_name }}" \
              --service-name "${{ needs.terraform-plan-and-apply-dev.outputs.api_management_name }}" \
              --api-id "sync-api-v1" \
              --display-name "Sync API" \
              --path "sync" \
              --api-version "v1" \
              --api-version-set-id "${{ needs.terraform-plan-and-apply-dev.outputs.api_version_set_id }}" \
              --protocols https \
              --specification-format OpenApi \
              --specification-path src/XtremeIdiots.Portal.Sync.App/openapi.json \
              --service-url "https://${{ needs.terraform-plan-and-apply-dev.outputs.function_app_name }}.azurewebsites.net" \
              --subscription-required false

      - name: Add Sync API to APIM product
        uses: azure/cli@v3
        with:
          inlineScript: |
            az apim product api add \
              --resource-group "${{ needs.terraform-plan-and-apply-dev.outputs.api_management_resource_group_name }}" \
              --service-name "${{ needs.terraform-plan-and-apply-dev.outputs.api_management_name }}" \
              --product-id "${{ needs.terraform-plan-and-apply-dev.outputs.api_management_product_id }}" \
              --api-id "sync-api-v1" || true
